
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: flash_sale_app
    ports:
      - "8000:8000"
    environment:
      APP_ENV: local
      APP_DEBUG: "false"
      APP_URL: http://localhost:8000
      # Talk to the sibling containers by service name.
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_DATABASE: flash_sale
      DB_USERNAME: root
      DB_PASSWORD: root
      REDIS_CLIENT: predis
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      CACHE_STORE: file
      SESSION_DRIVER: file
      QUEUE_CONNECTION: sync
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started

  mysql:
    
    image: mysql:8.4
    container_name: flash_sale_db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: flash_sale
      MYSQL_USER: dev_user
      MYSQL_PASSWORD: dev_password
    
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: flash_sale_redis
    # Host-published on 6380 to avoid clashing with a host Redis on 6379.
    # The app still reaches it internally at redis:6379 (unchanged).
    ports:
      - "6380:6379"

volumes:
  mysql_data:
